# Cilium Helm values for n4mlz-cluster.
# Installed on Talos with kubeProxyReplacement enabled.
# SYS_MODULE capability is excluded (Talos does not allow kernel module loading).
# KubePrism (localhost:7445) is used for the API endpoint.
# Version: 1.19.4

ipam:
  mode: kubernetes

kubeProxyReplacement: true

k8sServiceHost: localhost
k8sServicePort: 7445

securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

hubble:
  enabled: true
  relay:
    enabled: true
