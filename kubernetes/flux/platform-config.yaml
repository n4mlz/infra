# This Flux Kustomization reconciles platform configuration after controllers are ready.

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-config
  namespace: flux-system
spec:
  interval: 10m
  path: ./kubernetes/platform/config
  prune: true
  wait: true
  timeout: 10m
  dependsOn:
    - name: platform-controllers
  sourceRef:
    kind: GitRepository
    name: flux-system
