# This Flux Kustomization reconciles observability controllers and backends.

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-observability-controllers
  namespace: flux-system
spec:
  interval: 10m
  path: ./kubernetes/platform/controllers/observability
  prune: true
  wait: true
  timeout: 15m
  dependsOn:
    - name: platform-object-storage
  sourceRef:
    kind: GitRepository
    name: flux-system
