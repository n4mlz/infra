# This Flux Kustomization reconciles observability configuration after controllers are ready.

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-observability-config
  namespace: flux-system
spec:
  interval: 10m
  path: ./kubernetes/platform/config/observability
  prune: true
  wait: true
  timeout: 10m
  dependsOn:
    - name: platform-observability-controllers
  sourceRef:
    kind: GitRepository
    name: flux-system
