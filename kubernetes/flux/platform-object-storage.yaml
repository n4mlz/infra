# This Flux Kustomization reconciles the in-cluster S3-compatible object storage used by observability.

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-object-storage
  namespace: flux-system
spec:
  interval: 10m
  path: ./kubernetes/platform/controllers/object-storage
  prune: true
  wait: true
  timeout: 10m
  dependsOn:
    - name: platform-config
  sourceRef:
    kind: GitRepository
    name: flux-system
