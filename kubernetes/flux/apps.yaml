# This Flux Kustomization reconciles application workloads after the platform layer is ready.

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m
  path: ./kubernetes/apps
  prune: true
  dependsOn:
    - name: platform-config
  sourceRef:
    kind: GitRepository
    name: flux-system
