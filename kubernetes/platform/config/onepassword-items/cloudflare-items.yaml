# This file declares 1Password items that should be materialized as Kubernetes Secrets.
# Items must exist in 1Password before the operator can materialize them.

apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: cloudflare-cert-manager-token
  namespace: platform
spec:
  itemPath: "vaults/Infra/items/Cloudflare cert-manager DNS01 token"
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: cloudflare-external-dns-token
  namespace: platform
spec:
  itemPath: "vaults/Infra/items/Cloudflare external-dns token"
