# This policy announces public LoadBalancer IPs only on the public VLAN interface.
# Cilium lease election must be restricted to nodes that actually have eth1 on the public VLAN.

apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: public-gateway-l2-announcement
spec:
  serviceSelector:
    matchLabels:
      gateway.networking.k8s.io/gateway-name: public-gateway
  nodeSelector:
    matchExpressions:
      - key: kubernetes.io/hostname
        operator: In
        values:
          - wk-01
          - wk-02
  interfaces:
    - ^eth1$
  loadBalancerIPs: true
