# This policy announces public LoadBalancer IPs only on the public VLAN interface.
# Nodes without eth1 are naturally excluded because they do not match the interface selector.

apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: public-gateway-l2-announcement
spec:
  serviceSelector:
    matchLabels:
      gateway.networking.k8s.io/gateway-name: public-gateway
  interfaces:
    - ^eth1$
  loadBalancerIPs: true
