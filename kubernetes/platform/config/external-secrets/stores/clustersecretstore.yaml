# This ClusterSecretStore exposes the Infra 1Password vault to approved namespaces only.
# Depends on: op-service-account-token bootstrap Secret in external-secrets namespace.

apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: onepassword-infra
spec:
  provider:
    onepasswordSDK:
      vault: Infra
      auth:
        serviceAccountSecretRef:
          name: op-service-account-token
          namespace: external-secrets
          key: token
  conditions:
    - namespaceSelector:
        matchLabels:
          secrets.n4mlz.dev/onepassword-infra: "true"
