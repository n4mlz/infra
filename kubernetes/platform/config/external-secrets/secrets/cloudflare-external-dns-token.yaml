# This ExternalSecret creates the Cloudflare API token Secret consumed by external-dns.

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-external-dns-token
  namespace: external-dns
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-infra
  target:
    name: cloudflare-external-dns-token
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        token: "{{ .token }}"
  data:
    - secretKey: token
      remoteRef:
        key: "Cloudflare external-dns token/token"
