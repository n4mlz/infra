# This ExternalSecret creates the Cloudflare API token Secret consumed by cert-manager ClusterIssuer.

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-cert-manager-token
  namespace: cert-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-infra
  target:
    name: cloudflare-cert-manager-token
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        token: "{{ .token }}"
  data:
    - secretKey: token
      remoteRef:
        key: "Cloudflare cert-manager DNS01 token/token"
