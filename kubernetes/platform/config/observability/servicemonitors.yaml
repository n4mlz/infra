# This file defines additional scrape targets for platform observability.
# Depends on: kube-prometheus-stack (release label) and OpenTelemetry Operator.

apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: opentelemetry-collector
  namespace: platform
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - platform
  selector:
    matchLabels:
      app.kubernetes.io/managed-by: opentelemetry-operator
  endpoints:
    - port: metrics
      interval: 30s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: flux-system
  namespace: platform
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - flux-system
  selector:
    matchLabels:
      app.kubernetes.io/part-of: flux
  endpoints:
    - port: http-prom
      interval: 30s
