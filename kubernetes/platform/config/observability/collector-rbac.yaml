# This file grants OpenTelemetry Collectors read access to Kubernetes metadata used by the k8sattributes processor.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-gateway-collector
  namespace: platform
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-logs-collector
  namespace: platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: opentelemetry-collector-k8sattributes
rules:
  - apiGroups:
      - ""
    resources:
      - namespaces
      - nodes
      - pods
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-gateway-collector-k8sattributes
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: opentelemetry-collector-k8sattributes
subjects:
  - kind: ServiceAccount
    name: otel-gateway-collector
    namespace: platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-logs-collector-k8sattributes
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: opentelemetry-collector-k8sattributes
subjects:
  - kind: ServiceAccount
    name: otel-logs-collector
    namespace: platform
