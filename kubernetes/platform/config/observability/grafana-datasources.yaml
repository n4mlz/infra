# This file defines Grafana datasources managed by the Grafana sidecar.
# Depends on: Grafana sidecar (label grafana_datasource), Prometheus/Loki/Tempo services being reachable.

apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-observability-datasources
  namespace: platform
  labels:
    grafana_datasource: "1"
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://kube-prometheus-stack-prometheus.platform.svc.cluster.local:9090
        isDefault: true

      - name: Loki
        type: loki
        access: proxy
        url: http://loki.platform.svc.cluster.local:3100
        isDefault: false
        jsonData:
          derivedFields:
            - name: trace_id
              matcherRegex: "trace_id=(\\w+)"
              datasourceUid: tempo
              url: "$${__value.raw}"

      - name: Tempo
        uid: tempo
        type: tempo
        access: proxy
        url: http://tempo-query-frontend.platform.svc.cluster.local:3100
        isDefault: false
        jsonData:
          tracesToLogsV2:
            datasourceUid: Loki
            spanStartTimeShift: "-5m"
            spanEndTimeShift: "5m"
            filterByTraceID: true
          serviceMap:
            datasourceUid: Prometheus
