# This Gateway is the shared public HTTPS entrypoint.
# LoadBalancer IP is auto-assigned by kube-vip-cloud-provider.

apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: public-gateway
  namespace: platform
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
spec:
  gatewayClassName: istio
  listeners:
    - name: http
      hostname: "*.n4mlz.dev"
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      hostname: "*.n4mlz.dev"
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: wildcard-n4mlz-dev-tls
      allowedRoutes:
        namespaces:
          from: All
