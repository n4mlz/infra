# This job idempotently creates observability buckets and a limited MinIO user.
# Depends on: minio-root-credentials, observability-object-storage-credentials secrets, and MinIO service readiness.

apiVersion: batch/v1
kind: Job
metadata:
  name: minio-bootstrap-observability
  namespace: platform
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio-bootstrap-observability
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: quay.io/minio/mc:RELEASE.2025-10-15T17-29-55Z
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-root-credentials
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-root-credentials
                  key: MINIO_ROOT_PASSWORD
            - name: OBSERVABILITY_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: observability-object-storage-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: OBSERVABILITY_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: observability-object-storage-credentials
                  key: AWS_SECRET_ACCESS_KEY
          command:
            - /bin/sh
            - -ceu
            - |
              until mc alias set local http://minio.platform.svc.cluster.local:9000 "${MINIO_ROOT_USER}" "${MINIO_ROOT_PASSWORD}"; do
                sleep 5
              done

              mc mb --ignore-existing local/tempo-traces
              mc mb --ignore-existing local/loki-logs

              cat >/tmp/observability-policy.json <<'EOF'
              {
                "Version": "2012-10-17",
                "Statement": [
                  {
                    "Effect": "Allow",
                    "Action": ["s3:*"],
                    "Resource": [
                      "arn:aws:s3:::tempo-traces",
                      "arn:aws:s3:::tempo-traces/*",
                      "arn:aws:s3:::loki-logs",
                      "arn:aws:s3:::loki-logs/*"
                    ]
                  }
                ]
              }
              EOF

              mc admin policy create local observability /tmp/observability-policy.json || true
              mc admin user add local "${OBSERVABILITY_ACCESS_KEY}" "${OBSERVABILITY_SECRET_KEY}" || true
              mc admin policy attach local observability --user "${OBSERVABILITY_ACCESS_KEY}" || true
