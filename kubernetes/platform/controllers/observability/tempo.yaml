# This HelmRelease installs Tempo as the trace backend.
# Tempo stores trace blocks in the in-cluster MinIO S3-compatible object store.
# Depends on: MinIO service (minio.platform.svc.cluster.local:9000) and observability-object-storage-credentials secret.

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tempo
  namespace: platform
spec:
  interval: 10m
  releaseName: tempo
  chart:
    spec:
      chart: tempo-distributed
      version: "1.61.3"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
      interval: 24h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    global:
      extraEnvFrom:
        - secretRef:
            name: observability-object-storage-credentials

    tempo:
      structuredConfig:
        multitenancy_enabled: false

        server:
          http_listen_port: 3200

        distributor:
          receivers:
            otlp:
              protocols:
                grpc:
                  endpoint: 0.0.0.0:4317
                http:
                  endpoint: 0.0.0.0:4318

        storage:
          trace:
            backend: s3
            s3:
              bucket: tempo-traces
              endpoint: minio.platform.svc.cluster.local:9000
              region: us-east-1
              insecure: true
              forcepathstyle: true
              access_key: ${AWS_ACCESS_KEY_ID}
              secret_key: ${AWS_SECRET_ACCESS_KEY}

    ingester:
      replicas: 1
