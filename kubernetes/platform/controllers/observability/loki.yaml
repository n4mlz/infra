# This HelmRelease installs Loki as the log backend.
# Logs are ingested from OpenTelemetry Collector through Loki's native OTLP endpoint.
# Uses the community-maintained chart (forked at 6.55.0 for OSS users).
# Depends on: MinIO service (minio.platform.svc.cluster.local:9000) and observability-object-storage-credentials secret.

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: platform
spec:
  interval: 10m
  releaseName: loki
  chart:
    spec:
      chart: loki
      version: "18.1.1"
      sourceRef:
        kind: HelmRepository
        name: grafana-community
        namespace: flux-system
      interval: 24h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    deploymentMode: SingleBinary

    loki:
      auth_enabled: false

      commonConfig:
        replication_factor: 1

      schemaConfig:
        configs:
          - from: "2024-04-01"
            store: tsdb
            object_store: s3
            schema: v13
            index:
              prefix: loki_index_
              period: 24h

      storage:
        bucketNames:
          chunks: loki-logs
          ruler: loki-logs
          admin: loki-logs
        s3:
          endpoint: minio.platform.svc.cluster.local:9000
          region: us-east-1
          s3ForcePathStyle: true
          insecure: true
          accessKeyId: ${AWS_ACCESS_KEY_ID}
          secretAccessKey: ${AWS_SECRET_ACCESS_KEY}

      limits_config:
        retention_period: 24h
        allow_structured_metadata: true

    singleBinary:
      replicas: 1
      extraEnvFrom:
        - secretRef:
            name: observability-object-storage-credentials

    write:
      replicas: 0
    read:
      replicas: 0
    backend:
      replicas: 0

    gateway:
      enabled: false

    monitoring:
      serviceMonitor:
        enabled: true
