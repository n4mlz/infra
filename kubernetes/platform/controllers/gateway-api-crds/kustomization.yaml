# This file installs pinned Gateway API CRDs required by Istio Gateway API.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - artifacts/gateway.networking.k8s.io_gatewayclasses.yaml
  - artifacts/gateway.networking.k8s.io_gateways.yaml
  - artifacts/gateway.networking.k8s.io_httproutes.yaml
  - artifacts/gateway.networking.k8s.io_referencegrants.yaml
  - artifacts/gateway.networking.k8s.io_grpcroutes.yaml
  - artifacts/gateway.networking.k8s.io_tlsroutes.yaml
