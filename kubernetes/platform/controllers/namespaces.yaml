# This file defines baseline namespaces used by platform controllers.

apiVersion: v1
kind: Namespace
metadata:
  name: platform
  labels:
    # WORKAROUND: otel-logs-collector DaemonSet requires hostPath volumes for /var/log/pods.
    # Using privileged is too broad for this namespace. The proper fix is to:
    # - move otel-logs-collector to a dedicated namespace with privileged PSA, or
    # - use a per-service-account PSA exemption via admission controller, or
    # - annotate the pod with seccompProfile/allowPrivilegeEscalation to meet restricted profile.
    # https://kubernetes.io/docs/concepts/security/pod-security-standards/
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/enforce-version: latest
---
apiVersion: v1
kind: Namespace
metadata:
  name: kube-vip-svc
  labels:
    # kube-vip runs with hostNetwork and NET_ADMIN/NET_RAW capabilities
    # to assign VIPs to physical interfaces and send ARP.
    # https://kube-vip.io/docs/installation/
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/enforce-version: latest
---
apiVersion: v1
kind: Namespace
metadata:
  name: istio-system
