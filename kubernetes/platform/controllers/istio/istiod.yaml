# This HelmRelease installs istiod, the Istio control plane.
# Gateway API automated deployment is enabled.

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istiod
  namespace: istio-system
spec:
  interval: 30m
  chart:
    spec:
      chart: istiod
      version: "1.30.0"
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: flux-system
      interval: 24h
  values:
    pilot:
      env:
        PILOT_ENABLE_GATEWAY_API: "true"
        PILOT_ENABLE_GATEWAY_API_DEPLOYMENT_CONTROLLER: "true"
