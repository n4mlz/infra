# This HelmRelease deploys kube-vip as a DaemonSet that assigns LoadBalancer
# VIPs to eth1 and advertises them via ARP.
# See worklogs/2026-06-21.md for the migration from Cilium L2 Announcement.

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-vip-svc
  namespace: kube-vip-svc
spec:
  interval: 30m
  chart:
    spec:
      chart: kube-vip
      version: "0.9.9"
      sourceRef:
        kind: HelmRepository
        name: kube-vip
        namespace: flux-system
      interval: 24h
  values:
    env:
      vip_interface: "eth1"
      svc_election: "true"
      vip_leaderelection: "true"
      enable_service_security: "true"

    nodeSelector:
      infra.n4mlz.dev/public-gateway: "true"
