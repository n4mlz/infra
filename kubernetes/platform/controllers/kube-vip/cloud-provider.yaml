# This HelmRelease deploys kube-vip-cloud-provider which assigns LoadBalancer
# IPs from the public pool to Kubernetes services of type LoadBalancer.
# See worklogs/2026-06-21.md for the migration from Cilium LB IPAM.

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-vip-cloud-provider
  namespace: kube-vip-svc
spec:
  interval: 30m
  chart:
    spec:
      chart: kube-vip-cloud-provider
      version: "0.2.9"
      sourceRef:
        kind: HelmRepository
        name: kube-vip
        namespace: flux-system
      interval: 24h
  values:
    cm:
      data:
        range-global: "163.220.236.73-163.220.236.76"
        interface-global: "eth1"
        allow-share-global: "true"
