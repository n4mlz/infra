# This Taskfile manages DirectPV CSI driver lifecycle.
# The manifest is generated by the kubectl-directpv plugin.

version: "3"

vars:
  DIRECTPV_VERSION: v4.1.6
  ARTIFACTS_DIR: artifacts

tasks:
  update:
    desc: "Update vendored DirectPV install manifest."
    cmds:
      - mkdir -p "{{.ARTIFACTS_DIR}}"
      - 'test -x "$(which kubectl-directpv)" || (echo "kubectl-directpv plugin not found. Install from https://github.com/minio/directpv/releases" && exit 1)'
      - kubectl-directpv install -o yaml > "{{.ARTIFACTS_DIR}}/install.yaml"
