# This deployment validates that Flux can reconcile application workloads.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: smoke-test
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: smoke-test-nginx
  template:
    metadata:
      labels:
        app.kubernetes.io/name: smoke-test-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
