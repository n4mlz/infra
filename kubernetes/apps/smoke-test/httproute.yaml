# This HTTPRoute exposes the smoke-test app through the shared public Gateway.

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: smoke-test
  namespace: smoke-test
  annotations:
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
    external-dns.alpha.kubernetes.io/ttl: "300"
spec:
  parentRefs:
    - name: public-gateway
      namespace: platform
  hostnames:
    - smoke-test.n4mlz.dev
  rules:
    - backendRefs:
        - name: nginx
          port: 80
