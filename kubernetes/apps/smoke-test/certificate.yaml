# This Certificate verifies that cert-manager can issue certificates through Cloudflare DNS01.

apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: smoke-test-tls
  namespace: smoke-test
spec:
  secretName: smoke-test-tls
  issuerRef:
    name: letsencrypt-staging
    kind: ClusterIssuer
  dnsNames:
    - smoke-test.n4mlz.dev
